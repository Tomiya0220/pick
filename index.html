<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>15x15 ピクロス</title>
<style>
body {
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

#container {
  display: grid;
  grid-template-columns: auto auto;
  grid-template-rows: auto auto;
  gap: 5px;
}

#hintTop {
  display: grid;
  grid-template-columns: repeat(15, 30px);
  text-align: center;
  font-size: 10px;
}

#hintLeft {
  display: grid;
  grid-template-rows: repeat(15, 30px);
  text-align: right;
  font-size: 10px;
}

#grid {
  display: grid;
  grid-template-columns: repeat(15, 30px);
  grid-template-rows: repeat(15, 30px);
  gap: 2px;
}

.cell {
  width: 30px;
  height: 30px;
  border: 1px solid #ccc;
  background-color: white;
  cursor: pointer;
}

.cell.filled {
  background-color: black;
}

.cell.marked {
  background-color: lightgray;
}

button {
  margin: 5px;
}
</style>
</head>
<body>
<h1>15x15 ピクロス</h1>

<div>
  <button onclick="setMode('fill')">塗る</button>
  <button onclick="setMode('mark')">×</button>
  <button onclick="checkAnswer()">チェック</button>
  <button onclick="initGame()">新しい問題</button>
</div>

<div id="container">
  <div></div>
  <div id="hintTop"></div>
  <div id="hintLeft"></div>
  <div id="grid"></div>
</div>

<script>
const SIZE = 15;
let mode = 'fill';
let solution = [];
let player = [];

function setMode(m) { mode = m; }

function generateSolution() {
  return Array.from({length: SIZE}, () =>
    Array.from({length: SIZE}, () => Math.random() > 0.6 ? 1 : 0)
  );
}

function getHints(line) {
  let hints = [];
  let count = 0;

  for (let i = 0; i < line.length; i++) {
    if (line[i]) count++;
    else if (count) {
      hints.push(count);
      count = 0;
    }
  }
  if (count) hints.push(count);

  return hints.length ? hints : [0];
}

function drawHints() {
  const top = document.getElementById('hintTop');
  const left = document.getElementById('hintLeft');

  top.innerHTML = '';
  left.innerHTML = '';

  for (let c = 0; c < SIZE; c++) {
    let col = solution.map(r => r[c]);
    const div = document.createElement('div');
    div.innerHTML = getHints(col).join('<br>');
    top.appendChild(div);
  }

  for (let r = 0; r < SIZE; r++) {
    const div = document.createElement('div');
    div.innerHTML = getHints(solution[r]).join(',');
    left.appendChild(div);
  }
}

function createGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');

      cell.addEventListener('click', () => {
        if (mode === 'fill') {
          cell.classList.toggle('filled');
          player[r][c] = cell.classList.contains('filled') ? 1 : 0;
        } else {
          cell.classList.toggle('marked');
        }
      });

      grid.appendChild(cell);
    }
  }
}

function checkAnswer() {
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (player[r][c] !== solution[r][c]) {
        alert('まだ違います');
        return;
      }
    }
  }
  alert('クリア！');
}

function initGame() {
  solution = generateSolution();
  player = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  createGrid();
  drawHints();
}

initGame();
</script>
</body>
</html>
